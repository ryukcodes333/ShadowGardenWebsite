services:
  # API Server (Node.js)
  - type: web
    name: shadow-garden-api
    env: node
    region: singapore
    plan: free
    rootDir: artifacts/api-server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: 10000
      - key: SESSION_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BOT_SECRET_KEY
        sync: false
    healthCheckPath: /api/healthz

  # Frontend (Static Site)
  - type: web
    name: shadow-garden-web
    env: static
    region: singapore
    plan: free
    rootDir: artifacts/shadow-garden
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: shadow-garden-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
