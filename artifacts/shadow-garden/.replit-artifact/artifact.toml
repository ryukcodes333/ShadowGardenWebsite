kind = "web"
previewPath = "/"
title = "Shadow Garden"
version = "1.0.0"
id = "artifacts/shadow-garden"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23536

[services.development]
run = "pnpm --filter @workspace/shadow-garden run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadow-garden", "run", "build" ]
publicDir = "artifacts/shadow-garden/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23536"
BASE_PATH = "/"
